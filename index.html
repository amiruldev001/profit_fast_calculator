<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profit Fast Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #333;
        }

        .result-item label {
            margin: 0;
            font-weight: 600;
            color: #555;
        }

        .result-item .value {
            font-weight: 700;
            color: #667eea;
            font-size: 1.1em;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 2px solid #ddd;
        }

        .result-item:last-child .value {
            color: #28a745;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Profit Calculator</h1>
        
        <form id="calculatorForm">
            <div class="form-group">
                <label for="revenue">Revenue ($)</label>
                <input type="number" id="revenue" placeholder="Enter revenue" required min="0" step="0.01">
            </div>

            <div class="form-group">
                <label for="costs">Total Costs ($)</label>
                <input type="number" id="costs" placeholder="Enter total costs" required min="0" step="0.01">
            </div>

            <div class="form-group">
                <label for="taxes">Taxes ($)</label>
                <input type="number" id="taxes" placeholder="Enter taxes" required min="0" step="0.01">
            </div>

            <button type="submit">Calculate Profit</button>
        </form>

        <div class="result" id="result">
            <div class="result-item">
                <label>Revenue:</label>
                <span class="value" id="resultRevenue">$0.00</span>
            </div>
            <div class="result-item">
                <label>Total Costs & Taxes:</label>
                <span class="value" id="resultExpenses">$0.00</span>
            </div>
            <div class="result-item">
                <label>Net Profit:</label>
                <span class="value" id="resultProfit">$0.00</span>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('calculatorForm');
        const resultDiv = document.getElementById('result');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const revenue = parseFloat(document.getElementById('revenue').value);
            const costs = parseFloat(document.getElementById('costs').value);
            const taxes = parseFloat(document.getElementById('taxes').value);

            const totalExpenses = costs + taxes;
            const netProfit = revenue - totalExpenses;

            document.getElementById('resultRevenue').textContent = '$' + revenue.toFixed(2);
            document.getElementById('resultExpenses').textContent = '$' + totalExpenses.toFixed(2);
            document.getElementById('resultProfit').textContent = '$' + netProfit.toFixed(2);

            resultDiv.classList.add('show');
        });
    </script>
</body>
</html>
