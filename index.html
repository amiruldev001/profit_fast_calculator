<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quick Profit Calculator</title>

<meta name="theme-color" content="#020617">
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    radial-gradient(circle at top left,#38bdf833,transparent 30%),
    radial-gradient(circle at bottom right,#8b5cf633,transparent 30%),
    #020617;

    color:white;
}

.card{
    width:100%;
    max-width:420px;

    background:rgba(255,255,255,.05);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);
    border-radius:24px;

    padding:24px;
}

h1{
    text-align:center;
    margin-bottom:8px;

    background:linear-gradient(
    90deg,
    #38bdf8,
    #8b5cf6
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
    font-size:14px;
}

label{
    display:block;
    margin-bottom:8px;
    margin-top:16px;
    color:#94a3b8;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;

    border:none;
    outline:none;

    border-radius:12px;

    background:#0f172a;
    color:white;

    font-size:16px;
}

input:focus{
    border:1px solid #38bdf8;
}

.btn-group{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;

    padding:14px;

    border:none;
    border-radius:12px;

    cursor:pointer;

    font-size:15px;
    font-weight:bold;

    color:white;
}

.calculate-btn{
    background:linear-gradient(
    135deg,
    #38bdf8,
    #8b5cf6
    );
}

.clear-btn{
    background:#1e293b;
}

.copy-btn{
    background:#0f766e;
    margin-top:10px;
    width:100%;
}

.result{
    margin-top:20px;
    display:none;
}

.result-box{
    background:#0f172a;
    border-radius:12px;
    padding:14px;
    margin-top:10px;
}

.result-title{
    color:#94a3b8;
    font-size:13px;
}

.result-value{
    margin-top:5px;
    font-size:22px;
    font-weight:bold;
}

.green{
    color:#22c55e;
}

.red{
    color:#ef4444;
}
</style>
</head>

<body>

<div class="card">

<h1>Profit Calculator</h1>
<div class="subtitle">
Buy Low • Sell High
</div>

<label>Buy Price</label>
<input
id="buy"
type="number"
step="0.0001"
placeholder="0.7128">

<label>Modal (RM)</label>
<input
id="capital"
type="number"
placeholder="100">

<label>Sell Price</label>
<input
id="sell"
type="number"
step="0.0001"
placeholder="0.8127">

<div class="btn-group">

<button
class="calculate-btn"
onclick="calculate()">
Calculate
</button>

<button
class="clear-btn"
onclick="clearForm()">
Clear
</button>

</div>

<button
class="copy-btn"
onclick="copyResult()">
Copy Result
</button>

<div
class="result"
id="result">

<div class="result-box">
<div class="result-title">
Units Purchased
</div>
<div
class="result-value"
id="units">
</div>
</div>

<div class="result-box">
<div class="result-title">
Portfolio Value
</div>
<div
class="result-value"
id="value">
</div>
</div>

<div class="result-box">
<div class="result-title">
Profit
</div>
<div
class="result-value"
id="profit">
</div>
</div>

<div class="result-box">
<div class="result-title">
ROI
</div>
<div
class="result-value"
id="roi">
</div>
</div>

</div>

</div>

<script>

// Load last values

window.onload = () => {

["buy","capital","sell"].forEach(id => {

const value =
localStorage.getItem(id);

if(value){

document.getElementById(id).value =
value;

}

});

};

// Auto select input

document
.querySelectorAll("input")
.forEach(input => {

input.addEventListener(
"focus",
function(){

this.select();

});

});

// Enter on Sell Price

document
.getElementById("sell")
.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

calculate();

}

});

function formatRM(value){

return value.toLocaleString(
"en-MY",
{
minimumFractionDigits:2,
maximumFractionDigits:2
}
);

}

function calculate(){

const buy =
parseFloat(
document.getElementById("buy").value
);

const capital =
parseFloat(
document.getElementById("capital").value
);

const sell =
parseFloat(
document.getElementById("sell").value
);

if(
!buy ||
!capital ||
!sell
){

alert(
"Please fill all fields"
);

return;

}

localStorage.setItem(
"buy",
buy
);

localStorage.setItem(
"capital",
capital
);

localStorage.setItem(
"sell",
sell
);

const units =
capital / buy;

const value =
units * sell;

const profit =
value - capital;

const roi =
(profit / capital) * 100;

document.getElementById(
"units"
).innerText =
units.toFixed(4);

document.getElementById(
"value"
).innerText =
"RM " +
formatRM(value);

document.getElementById(
"profit"
).innerText =
"RM " +
formatRM(profit);

document.getElementById(
"roi"
).innerText =
roi.toFixed(2) + "%";

const profitEl =
document.getElementById(
"profit"
);

const roiEl =
document.getElementById(
"roi"
);

if(profit >= 0){

profitEl.className =
"result-value green";

roiEl.className =
"result-value green";

}else{

profitEl.className =
"result-value red";

roiEl.className =
"result-value red";

}

document.getElementById(
"result"
).style.display =
"block";

}

function clearForm(){

["buy","capital","sell"]
.forEach(id => {

document.getElementById(
id
).value = "";

localStorage.removeItem(id);

});

document.getElementById(
"result"
).style.display =
"none";

}

function copyResult(){

const text =

"Profit: " +
document.getElementById(
"profit"
).innerText +

"\nROI: " +

document.getElementById(
"roi"
).innerText;

navigator.clipboard
.writeText(text);

alert("Result copied!");

}

</script>

</body>
</html>
